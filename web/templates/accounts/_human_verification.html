{# Expects: human_question, human_options, human_honeypot_name #}
<fieldset class="auth-human-verify">
  <legend class="auth-human-verify__legend">Are you human?</legend>
  <div class="auth-human-verify__question-row">
    <p class="auth-human-verify__question" id="human-verify-desc" aria-live="polite">{{ human_question }}</p>
    <button type="button" class="auth-human-verify__new-question" data-human-challenge-refresh data-url="{% url 'login_human_challenge_refresh' %}" aria-label="Get a different question">New question</button>
  </div>
  <div class="auth-human-verify__options" role="group" aria-labelledby="human-verify-desc">
    {% for opt in human_options %}
    <label class="auth-human-verify__opt">
      <input type="radio" name="human_verification" value="{{ opt.id }}" required class="auth-human-verify__radio">
      <span class="auth-human-verify__label-text">{{ opt.label }}</span>
    </label>
    {% endfor %}
  </div>
</fieldset>
<input type="text" name="{{ human_honeypot_name }}" value="" autocomplete="off" tabindex="-1" class="auth-honeypot" aria-hidden="true">
<script>
(function () {
  document.querySelectorAll("[data-human-challenge-refresh]").forEach(function (btn) {
    var fieldset = btn.closest(".auth-human-verify");
    if (!fieldset) return;
    var url = btn.getAttribute("data-url");
    var questionEl = fieldset.querySelector("#human-verify-desc");
    var optionsWrap = fieldset.querySelector(".auth-human-verify__options");
    if (!url || !questionEl || !optionsWrap) return;
    btn.addEventListener("click", function () {
      btn.disabled = true;
      fetch(url, { credentials: "same-origin", headers: { Accept: "application/json" } })
        .then(function (r) {
          if (!r.ok) throw new Error("refresh failed");
          return r.json();
        })
        .then(function (data) {
          questionEl.textContent = data.question || "";
          optionsWrap.innerHTML = "";
          (data.options || []).forEach(function (opt) {
            var label = document.createElement("label");
            label.className = "auth-human-verify__opt";
            var input = document.createElement("input");
            input.type = "radio";
            input.name = "human_verification";
            input.value = opt.id;
            input.required = true;
            input.className = "auth-human-verify__radio";
            var span = document.createElement("span");
            span.className = "auth-human-verify__label-text";
            span.textContent = opt.label;
            label.appendChild(input);
            label.appendChild(span);
            optionsWrap.appendChild(label);
          });
        })
        .catch(function () {})
        .finally(function () {
          btn.disabled = false;
        });
    });
  });
})();
</script>
