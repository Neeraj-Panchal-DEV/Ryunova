# App-only: PostgreSQL on the EC2 host (shared DB). FinText often uses :8000; RyuNova uses
# 8010 (FastAPI) and 8011 (Django). ALB can target one or both ports via separate listeners / target groups.
#
# Deploy: /opt/apps/apps_ryunova — compose project apps_ryunova

services:
  api:
    container_name: ryunova_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${RYUNOVA_API_IMAGE:-ryunova-api:local}
    env_file:
      - .env
    ports:
      - "${RYUNOVA_API_PORT:-8010}:8010"
    volumes:
      - ./data/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    container_name: ryunova_web
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ${RYUNOVA_WEB_IMAGE:-ryunova-web:local}
    env_file:
      - .env
    ports:
      - "${RYUNOVA_WEB_PORT:-8011}:8011"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
