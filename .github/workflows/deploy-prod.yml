# RyuNova Platform — deploy to EC2 (aligned with dragon-latrobe_fintext secret names).
# App root on the instance: /opt/apps/app_ryunova only (does not create FinText's /opt/apps/apps_fintext).
# Shared PostgreSQL on the EC2 host; FastAPI :8010 and Django :8011 published on the instance.
# FinText typically uses :8000 — keep ports separate on the same instance.
#
# Triggers: push to branch 'prod' OR workflow_dispatch.
#
# Required GitHub secrets (same as FinText where applicable):
#   PROD_EC2_HOST, PROD_EC2_USER, PROD_PEM_SSH_KEY (or EC2_HOST_PROD + EC2_SSH_KEY_PROD)
#   PROD_POSTGRES_ADMIN_USER, PROD_POSTGRES_ADMIN_PASSWORD
#   PROD_POSTGRES_APPL_USER, PROD_POSTGRES_APPL_PASSWORD
#   DJANGO_SECRET_KEY
# Strongly recommended:
#   PROD_SITE_DOMAIN — Django hostname (no https://), e.g. app.ryunova.example.com
# Optional:
#   PROD_API_PUBLIC_HOST — if set, overrides FastAPI public URL base (API_PUBLIC_URL); if unset, defaults to api.<PROD_SITE_DOMAIN>
#   PROD_AWS_S3_MEDIA_BUCKET — defaults to ryunova-channels-organisations-media if unset
#   AWS_REGION or PROD_AWS_REGION — S3 URL region (default ap-southeast-2)
#   PROD_MEDIA_PUBLIC_BASE_URL — override S3 virtual-host URL (e.g. CloudFront)
#   PROD_DB_HOST, PROD_DB_PORT, PROD_POSTGRES_DB_NAME, PROD_EMAIL_*, ECR_REGISTRY + AWS keys (see docs/DEPLOYMENT_EC2_ALB.md).
# ECR: one repository (default prod/ryunova-channels); images are tagged api-<sha> and web-<sha>. Optional PROD_ECR_REPOSITORY overrides the repo name.
# DB: deploy runs scripts/run_ryunova_migrations.sh on EC2 — creates DB if allowed, ensures app role, applies db/migrations/order.txt (see db/README.md).

name: Deploy to Production

on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (default: prod)"
        required: true
        default: "prod"

env:
  EC2_HOST: ${{ secrets.PROD_EC2_HOST || secrets.EC2_HOST_PROD }}
  EC2_USER: ${{ secrets.PROD_EC2_USER }}
  DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || 'prod' }}
  # secrets are not allowed in step `if:` — expose a string flag here instead
  DO_ECR_PUSH: ${{ secrets.ECR_REGISTRY != '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Verify required secrets
        run: |
          echo "Verifying required secrets..."
          MISSING_SECRETS=()
          [ -z "${{ secrets.PROD_EC2_HOST }}" ] && [ -z "${{ secrets.EC2_HOST_PROD }}" ] && MISSING_SECRETS+=("PROD_EC2_HOST or EC2_HOST_PROD")
          [ -z "${{ secrets.PROD_EC2_USER }}" ] && MISSING_SECRETS+=("PROD_EC2_USER")
          [ -z "${{ secrets.PROD_POSTGRES_ADMIN_USER }}" ] && MISSING_SECRETS+=("PROD_POSTGRES_ADMIN_USER")
          [ -z "${{ secrets.PROD_POSTGRES_ADMIN_PASSWORD }}" ] && MISSING_SECRETS+=("PROD_POSTGRES_ADMIN_PASSWORD")
          [ -z "${{ secrets.PROD_POSTGRES_APPL_USER }}" ] && MISSING_SECRETS+=("PROD_POSTGRES_APPL_USER")
          [ -z "${{ secrets.PROD_POSTGRES_APPL_PASSWORD }}" ] && MISSING_SECRETS+=("PROD_POSTGRES_APPL_PASSWORD")
          [ -z "${{ secrets.PROD_PEM_SSH_KEY }}" ] && [ -z "${{ secrets.EC2_SSH_KEY_PROD }}" ] && MISSING_SECRETS+=("PROD_PEM_SSH_KEY or EC2_SSH_KEY_PROD")
          [ -z "${{ secrets.DJANGO_SECRET_KEY }}" ] && MISSING_SECRETS+=("DJANGO_SECRET_KEY")
          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${MISSING_SECRETS[*]}"
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Verify EC2 connectivity
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_PEM_SSH_KEY || secrets.EC2_SSH_KEY_PROD }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "echo '✅ EC2 connectivity verified'"
          rm -f ~/.ssh/deploy_key

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            web/requirements.txt

      - name: Sanity checks (API + Django)
        run: |
          pip install --quiet -r backend/requirements.txt
          (cd backend && python -c "from app.main import app; print('✅ FastAPI app import OK')")
          pip install --quiet -r web/requirements.txt
          DJANGO_SECRET_KEY=ci-check-not-for-prod DEBUG=true python web/manage.py check

      - name: Configure AWS (ECR push)
        if: ${{ env.DO_ECR_PUSH == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}

      - name: Log in to Amazon ECR
        if: ${{ env.DO_ECR_PUSH == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker images to ECR
        if: ${{ env.DO_ECR_PUSH == 'true' }}
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          TAG: ${{ github.sha }}
        run: |
          ECR_REPO="${{ secrets.PROD_ECR_REPOSITORY }}"
          ECR_REPO="${ECR_REPO:-prod/ryunova-channels}"
          docker build -t "$REGISTRY/${ECR_REPO}:api-$TAG" -f backend/Dockerfile backend/
          docker build -t "$REGISTRY/${ECR_REPO}:web-$TAG" -f web/Dockerfile web/
          docker push "$REGISTRY/${ECR_REPO}:api-$TAG"
          docker push "$REGISTRY/${ECR_REPO}:web-$TAG"

      - name: Setup SSH (deploy)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_PEM_SSH_KEY || secrets.EC2_SSH_KEY_PROD }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Clone or update repo on EC2 and run DB migrations
        env:
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DB_HOST_VAL: ${{ secrets.PROD_DB_HOST || secrets.PROD_EC2_HOST || secrets.EC2_HOST_PROD }}
          DB_PORT_VAL: ${{ secrets.PROD_DB_PORT || '5432' }}
          DB_NAME_VAL: ${{ secrets.PROD_POSTGRES_DB_NAME || secrets.PROD_DB_NAME || 'latrobe_apps_db' }}
          ADMIN_USER: ${{ secrets.PROD_POSTGRES_ADMIN_USER }}
          ADMIN_PW: ${{ secrets.PROD_POSTGRES_ADMIN_PASSWORD }}
          APPL_USER: ${{ secrets.PROD_POSTGRES_APPL_USER }}
          APPL_PW: ${{ secrets.PROD_POSTGRES_APPL_PASSWORD }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} bash -s << REMOTE_SCRIPT
          set -euo pipefail
          APP_DIR="/opt/apps/app_ryunova"
          sudo mkdir -p /opt/apps
          if [ ! -d "\$APP_DIR" ]; then
            echo "--- First-time: clone repo to \$APP_DIR ---"
            sudo git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "\$APP_DIR"
            sudo chown -R \$USER:\$USER "\$APP_DIR"
          fi
          mkdir -p "\$APP_DIR/data/uploads"
          cd "\$APP_DIR"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin
          git reset --hard "origin/${DEPLOY_BRANCH}"

          echo "--- RyuNova: DB bootstrap + SQL migrations (see db/migrations/order.txt) ---"
          export ADMIN_USER="${ADMIN_USER}"
          export ADMIN_PW="${ADMIN_PW}"
          export APPL_USER="${APPL_USER}"
          export APPL_PW="${APPL_PW}"
          export DB_HOST="${DB_HOST_VAL}"
          export DB_PORT="${DB_PORT_VAL}"
          export DB_NAME="${DB_NAME_VAL}"
          export REPO_DIR="\$APP_DIR"
          chmod +x "\$APP_DIR/scripts/run_ryunova_migrations.sh"
          bash "\$APP_DIR/scripts/run_ryunova_migrations.sh"
          REMOTE_SCRIPT

      - name: Generate .env and upload
        env:
          DB_PORT_VAL: ${{ secrets.PROD_DB_PORT || '5432' }}
          DB_NAME_VAL: ${{ secrets.PROD_POSTGRES_DB_NAME || secrets.PROD_DB_NAME || 'latrobe_apps_db' }}
          APPL_USER: ${{ secrets.PROD_POSTGRES_APPL_USER }}
          APPL_PW: ${{ secrets.PROD_POSTGRES_APPL_PASSWORD }}
          SITE_DOMAIN_VAL: ${{ secrets.PROD_SITE_DOMAIN }}
          API_HOST_VAL: ${{ secrets.PROD_API_PUBLIC_HOST }}
          DJANGO_SECRET_KEY_VAL: ${{ secrets.DJANGO_SECRET_KEY }}
          EMAIL_HOST_PASSWORD_VAL: ${{ secrets.PROD_EMAIL_HOST_PASSWORD || '' }}
          EMAIL_HOST_USER_VAL: ${{ secrets.PROD_EMAIL_HOST_USER || '' }}
          DEFAULT_FROM_EMAIL_VAL: ${{ secrets.PROD_DEFAULT_FROM_EMAIL || '' }}
          EMAIL_FROM_NAME_VAL: ${{ secrets.PROD_EMAIL_FROM_NAME || '' }}
          AWS_S3_MEDIA_BUCKET_VAL: ${{ secrets.PROD_AWS_S3_MEDIA_BUCKET }}
          AWS_S3_REGION_VAL: ${{ secrets.AWS_REGION || secrets.PROD_AWS_REGION || 'ap-southeast-2' }}
          MEDIA_PUBLIC_BASE_URL_VAL: ${{ secrets.PROD_MEDIA_PUBLIC_BASE_URL }}
        run: |
          python3 scripts/deploy_generate_ec2_env.py > /tmp/ryunova.env
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/ryunova.env \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/opt/apps/app_ryunova/.env
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "chmod 600 /opt/apps/app_ryunova/.env"

      - name: Start stack (ECR pull or local build)
        run: |
          REG="${{ secrets.ECR_REGISTRY }}"
          TAG="${{ github.sha }}"
          AWSR="${{ secrets.AWS_REGION || 'ap-southeast-2' }}"
          ECR_REPO="${{ secrets.PROD_ECR_REPOSITORY }}"
          ECR_REPO="${ECR_REPO:-prod/ryunova-channels}"
          # ECR pull only if registry is set *and* this workflow pushed images (requires AWS keys on the runner).
          if [ -n "$REG" ] && [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
              env REG="$REG" TAG="$TAG" AWS_REGION="$AWSR" ECR_REPO="$ECR_REPO" bash -s <<'EOF'
          set -euo pipefail
          cd /opt/apps/app_ryunova
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" --connect-timeout 2 2>/dev/null || true)
          if [ -n "$TOKEN" ]; then PRIV_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4 2>/dev/null); else PRIV_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4 2>/dev/null); fi
          if [ -n "$PRIV_IP" ]; then grep -q '^ALLOWED_HOSTS_EXTRA=' .env 2>/dev/null && sed -i.bak '/^ALLOWED_HOSTS_EXTRA=/d' .env; echo "ALLOWED_HOSTS_EXTRA=$PRIV_IP" >> .env; fi
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REG"
          export RYUNOVA_API_IMAGE="$REG/${ECR_REPO}:api-$TAG"
          export RYUNOVA_WEB_IMAGE="$REG/${ECR_REPO}:web-$TAG"
          docker compose -p ryunova -f docker-compose.app-only.yml pull
          docker compose -p ryunova -f docker-compose.app-only.yml up -d
          EOF
          else
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} bash -s <<'EOF'
          set -euo pipefail
          cd /opt/apps/app_ryunova
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" --connect-timeout 2 2>/dev/null || true)
          if [ -n "$TOKEN" ]; then PRIV_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4 2>/dev/null); else PRIV_IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4 2>/dev/null); fi
          if [ -n "$PRIV_IP" ]; then grep -q '^ALLOWED_HOSTS_EXTRA=' .env 2>/dev/null && sed -i.bak '/^ALLOWED_HOSTS_EXTRA=/d' .env; echo "ALLOWED_HOSTS_EXTRA=$PRIV_IP" >> .env; fi
          docker compose -p ryunova -f docker-compose.app-only.yml down || true
          docker compose -p ryunova -f docker-compose.app-only.yml up -d --build
          EOF
          fi

      - name: Verify API health
        run: |
          # Curl localhost on EC2 over SSH — avoids SG rules that block :8010 from GitHub runners.
          # Retry: uvicorn often needs several seconds after `compose up`; a single curl can see HTTP 000.
          # Remote script is single-quoted so $ expands on the instance, not the Actions runner.
          CODE=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ env.EC2_HOST }} \
            'for i in $(seq 1 40); do
              c=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8010/health 2>/dev/null || true)
              c=${c:-000}
              if [ "$c" = "200" ]; then echo "$c"; exit 0; fi
              echo "waiting for API ($i/40) HTTP $c" >&2
              sleep 2
            done
            c=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8010/health 2>/dev/null || true)
            echo "${c:-000}"
            exit 1' || true)
          CODE=$(echo "$CODE" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ "$CODE" = "200" ]; then echo "✅ API /health OK"; else echo "❌ API HTTP $CODE (after ~80s of retries; check docker logs ryunova_api on EC2)"; exit 1; fi

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key /tmp/ryunova.env
